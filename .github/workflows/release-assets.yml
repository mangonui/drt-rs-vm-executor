name: Release native libraries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.92"

      - name: Build linux amd64
        run: make capi-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            target/release/libvmexeccapi.so
            c-api/libvmexeccapi.h

  build-linux-arm64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          platforms: linux/arm64
          file: ./Docker/arm64.dockerfile
          tags: mx-builder

      - name: Export linux arm64 lib
        run: docker run --platform=linux/arm64 --rm mx-builder cat /data/libvmexeccapi_arm.so > libvmexeccapi_arm.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: libvmexeccapi_arm.so

  build-macos-amd64:
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.92"

      - name: Build macOS amd64
        run: make capi-osx-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: target/release/libvmexeccapi.dylib

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.92"

      - name: Build macOS arm64
        run: make capi-osx-arm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: target/release/libvmexeccapi_arm.dylib

  attach-to-release:
    needs:
      - build-linux-amd64
      - build-linux-arm64
      - build-macos-amd64
      - build-macos-arm64
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show files
        run: find dist -type f | sort

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.release.tag_name }}"

          gh release upload "$tag" \
            dist/linux-amd64/libvmexeccapi.so \
            dist/linux-amd64/libvmexeccapi.h \
            dist/linux-arm64/libvmexeccapi_arm.so \
            dist/macos-amd64/libvmexeccapi.dylib \
            dist/macos-arm64/libvmexeccapi_arm.dylib \
            --clobber